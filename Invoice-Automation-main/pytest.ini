[pytest]
# Pytest configuration for Freight Audit Agent tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Add current directory to Python path
pythonpath = .

# Minimum Python version
minversion = 7.0

# Command line options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Enable strict markers (all markers must be registered)
    --strict-markers
    # Disable warnings summary (keep output clean)
    -p no:warnings
    # Show coverage report
    --cov=lambda_functions
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    # Coverage thresholds (will fail if coverage is below these values)
    --cov-fail-under=80

# Markers for organizing tests
markers =
    unit: Unit tests that mock all external dependencies
    integration: Integration tests that may call real services (not run by default)
    slow: Tests that take significant time to execute
    email_poller: Tests for invoice_email_poller Lambda
    blueprint_manager: Tests for bedrock_blueprint_manager Lambda
    invoice_processor: Tests for bedrock_invoice_processor Lambda
    gvp_publisher: Tests for gvp_invoice_publisher Lambda

# Coverage options
[coverage:run]
source = lambda_functions
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*
    */site-packages/*

[coverage:report]
# Regexes for lines to exclude from consideration
exclude_lines =
    # Have to re-enable the standard pragma
    pragma: no cover
    # Don't complain about missing debug-only code
    def __repr__
    # Don't complain if tests don't hit defensive assertion code
    raise AssertionError
    raise NotImplementedError
    # Don't complain if non-runnable code isn't run
    if __name__ == .__main__.:
    # Don't complain about abstract methods
    @abstractmethod

# Output formatting
[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml
