services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: p12-clickhouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8123"   # HTTP — localhost only (admin / healthcheck)
      - "0.0.0.0:8443:8443"     # HTTPS — public, requires auth
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: training_observability
    volumes:
      # EBS gp3 bind-mounts (external volume at /data/clickhouse)
      - /data/clickhouse/data:/var/lib/clickhouse
      - /data/clickhouse/logs:/var/log/clickhouse-server
      - ./initdb.d:/docker-entrypoint-initdb.d:ro
      - ./users.d:/etc/clickhouse-server/users.d:ro
      - ./config.d:/etc/clickhouse-server/config.d:ro
      - ./tls:/etc/clickhouse-server/tls:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: p12-grafana
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "0.0.0.0:3000:3000"     # Grafana UI
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-p12training}
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/training-overview.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  grafana-data:
