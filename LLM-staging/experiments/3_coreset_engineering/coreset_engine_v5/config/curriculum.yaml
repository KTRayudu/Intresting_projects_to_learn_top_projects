# ============================================================
# DOMAIN GROUPING
# ============================================================
domains:
  definition_method: "team1_tags_consolidated_by_team2"

  domain_groups:
    - id: "web"
    - id: "encyclopedia"
    - id: "news"
    - id: "science"
    - id: "math"
    - id: "code"
    - id: "literature"
    - id: "instruction"
    - id: "social"
    - id: "qa"
    - id: "education"

  band_domain_policy:
    B0:
      ["web", "social", "qa", "education", "language_literacy", "conversation"]
    B1:
      [
        "web",
        "encyclopedia",
        "news",
        "social",
        "qa",
        "education",
        "language_literacy",
        "conversation",
      ]
    B2:
      [
        "encyclopedia",
        "news",
        "education",
        "literature",
        "web",
        "qa",
        "conversation",
      ]
    B3: ["science", "math", "education", "code", "literature", "conversation"]
    B4: ["science", "math", "code", "instruction"]
    B5: ["instruction", "science", "math", "code"]

# ============================================================
# EVALUATION SIGNAL INTERFACE
# ============================================================
evaluation_interface:
  purpose: "guides_adaptive_knobs_only"
  signals:
    - name: "reasoning_eval_delta"
      owner_team: "Benchmarking"
    - name: "long_context_eval_delta"
      owner_team: "Benchmarking"
  restriction: "NO_STRUCTURAL_CHANGES_ALLOWED"
