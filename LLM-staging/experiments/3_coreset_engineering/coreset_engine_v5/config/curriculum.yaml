coordination:
  tokenizer_lab:
    team: "Team 6"
    required_outputs:
      - "tokenizer_proxy_spec"
      - "multi-tokenizer difficulty proxy recommendations"
  agentic_team:
    team: "Team 17"
    required_outputs:
      - "safe_agentic_trace_formats"
      - "tool-call data staging rules"
