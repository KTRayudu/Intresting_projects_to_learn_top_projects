# ============================================================
# MODALITY SYSTEM
# ============================================================
modalities:
  general_text:
    purpose: "language fluency"
  structured_knowledge:
    purpose: "factual and conceptual grounding"
  code:
    purpose: "procedural and algorithmic reasoning"
    allowed_languages:
      ["python", "javascript", "typescript", "c", "cpp", "java"]
  math:
    purpose: "symbolic abstraction"
  research_papers:
    purpose: "research papers"
  cot_reasoning:
    purpose: "scaffolded reasoning traces"
  agentic_traces:
    purpose: "tool-use and planning"
    owner_team: "Team 17"
    status: "format_pending"

# ============================================================
# DATASET INTERFACE
# ============================================================
dataset_interface:
  input_from_team1:
    required_fields:
      [
        "id",
        "text",
        "source",
        "added",
        "created",
        "metadata",
        "domain",
        "language",
      ]
  segmentation_requests_allowed: true
  partial_rejection_allowed: true

# ============================================================
# STAGE & GROWTH SCHEDULE
# ============================================================
growth_schedule:
  stages:
    - name: "1B"
      order: 1
      profile: "base"
      params: 1000000000.0 # 1B
    - name: "3B"
      order: 2
      profile: "harder_shift_1"
      params: 3000000000.0 # 3B
    - name: "8B"
      order: 3
      profile: "harder_shift_2"
      params: 8000000000.0 # 8B
    - name: "70B"
      order: 4
      profile: "final_adaptive"
      params: 70000000000.0 # 70B

  stage_profiles:
    base:
      total_tokens: 20000000000
      band_weights:
        B0: 0.49
        B1: 0.13
        B2: 0.17
        B3: 0.13
        B4: 0.06
        B5: 0.02
      modality_weights:
        general_text: 0.86
        code: 0.12
        cot_reasoning: 0.02
        agentic_traces: 0.00

    harder_shift_1:
      total_tokens: 40000000000
      band_weights:
        B0: 0.43
        B1: 0.15
        B2: 0.19
        B3: 0.15
        B4: 0.06
        B5: 0.02
      modality_weights:
        general_text: 0.78
        code: 0.18
        cot_reasoning: 0.03
        agentic_traces: 0.01

    harder_shift_2:
      total_tokens: 100000000000
      band_weights:
        B0: 0.27
        B1: 0.19
        B2: 0.24
        B3: 0.19
        B4: 0.08
        B5: 0.03
      modality_weights:
        general_text: 0.68
        code: 0.24
        cot_reasoning: 0.05
        agentic_traces: 0.03

    final_adaptive:
      total_tokens: 240000000000
      band_weights:
        B0: 0.16
        B1: 0.22
        B2: 0.28
        B3: 0.22
        B4: 0.09
        B5: 0.03
      modality_weights:
        general_text: 0.60
        code: 0.28
        cot_reasoning: 0.07
        agentic_traces: 0.05
    adaptive_knobs:
      enabled: true
      bounds:
        band_delta_max: 0.03
        modality_delta_max: 0.02

# ============================================================
# GUARDRAILS & SMOOTHING
# ============================================================
guardrails:
  rolling_window:
    window_tokens: 2000000
    max_band_delta: 0.03
    max_domain_delta: 0.05

  caps:
    cot:
      global_max: 0.06
    agentic:
      global_max: 0.03
      earliest_band: "B4"

# ============================================================
# Co-ordination
# ============================================================
