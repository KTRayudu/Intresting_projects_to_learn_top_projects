# ============================================================
# curriculum.yaml — CANONICAL CURRICULUM CONSTITUTION - AUTHORITATIVE
# ============================================================
# This file is the single source of truth for curriculum policy.
# Any deviation requires escalation + re-freeze.
# ============================================================

version: "0.7"
owner_team: "Team 2: Curriculum Architects"
status: "FROZEN"
frozen_on: "2026-02-02"
change_policy: "STRUCTURE_IMMUTABLE" # "NO_CHANGES_ALLOWED"

# ============================================================
# GLOBAL CONTRACT
# ============================================================
global_contract:
  guarantees:
    determinism:
      sampling: true
      batch_content: true
      data_order: true
      fixed_seed_required: true
    safety_defaults:
      downgrade_on_uncertainty: true
      upgrade_never_allowed: true
  enforcement:
    violation_action: "REJECT_OR_HALT"
  rejection_reasons:
    - "language_not_en_or_indic"
    - "below_minimum_token_threshold"

# ============================================================
# LANGUAGE & CONTEXT POLICY
# ============================================================
language_and_context:
  language_policy:
    definition_method: "hard_cap_with_stage_gating"
    primary_languages:
      - lang: "en"
        max_share: 0.92
    secondary_languages:
      - lang: ["as", "bn", "gu", "hi", "kn", "ml", "mr", "or", "pa", "ta", "te"]
        max_share: 0.08
        earliest_stage: "1B"
    excluded_languages: ["zh", "ja", "ko", "fr", "de", "es"]
    violation_action: "DROP_SAMPLE"

  context_policy:
    definition_method: "fixed_pretrain_context"
    min_context_tokens: 4096
    pretrain_context_tokens: 4096
    short_context_pretraining: false
    long_context_extension:
      allowed_later: true
      owned_by: "Post-pretraining teams"

# ============================================================
# DIFFICULTY SYSTEM (CORE OF CURRICULUM)
# ============================================================
difficulty_system:
  definition_method:
    primary: "heuristic"
    secondary: "tokenizer_proxy"
    audit:
      enabled: true
      audit_model: "small_frozen_lm"
      scope: "spot_checks_only"

  tokenizer_proxy:
    owner_team: "Team 6: Tokenizer Lab"
    purpose: "complexity_proxy_not_quality"
    required_metrics:
      - avg_token_rank
      - rare_token_ratio
      - tail_token_ratio
      - symbolic_token_density
      - structural_token_density

  # Band difficulty centroids for capacity alignment
  difficulty_centroids:
    B0: 0.10
    B1: 0.22
    B2: 0.40
    B3: 0.60
    B4: 0.78
    B5: 0.92

  # Minimum required proportion for each band
  floors:
    B0: 0.10
    B1: 0.14
    B2: 0.18
    B3: 0.14
    B4: 0.06
    B5: 0.02

  # Model Capacity Configuration
  model_capacity_config:
    min_params: 1000000000.0 # 1B
    max_params: 70000000000.0 # 70B

  bands:
    # avg_max: The highest allowed average token difficulty across the entire text.
    # max_max: The highest allowed single hardest token that can appear in the text.
    # p95_max: The highest allowed token difficulty that 95% of the text stays below, ignoring rare outliers.
    B0:
      name: "Nursery"
      intent: "Surface language acquisition"
      allowed_modalities: ["general_text"]
      allowed_domains: ["web", "social", "qa"]
      constraints:
        tokenizer:
          avg_max: 5000
          max_max: 10000
          p95_max: 8000
          description: "Nursery: Very high frequency tokens, simple language"
      reasoning_policy:
        cot: "forbidden"
        agentic: "forbidden"

    B1:
      name: "Primary"
      intent: "Fluent everyday language"
      allowed_modalities: ["general_text", "clean_exposition"]
      allowed_domains: ["web", "encyclopedia", "news", "social", "qa"]
      constraints:
        tokenizer:
          avg_max: 10000
          max_max: 20000
          p95_max: 15000
          description: "Primary: High frequency tokens, everyday language"
      reasoning_policy:
        cot: "forbidden"
        agentic: "forbidden"

    B2:
      name: "HighSchool"
      intent: "Structured knowledge without explicit reasoning"
      allowed_modalities: ["general_text", "structured_knowledge"]
      allowed_domains:
        ["encyclopedia", "news", "education", "literature", "web", "qa"]
      constraints:
        tokenizer:
          avg_max: 20000
          max_max: 40000
          p95_max: 30000
          description: "High School: Medium frequency, structured knowledge"
      reasoning_policy:
        cot: "forbidden"
        agentic: "forbidden"

    B3:
      name: "Undergraduate"
      intent: "Reasoning emergence"
      allowed_modalities: ["structured_knowledge", "technical_text", "code"]
      allowed_domains: ["science", "math", "education", "code", "literature"]
      constraints:
        tokenizer:
          avg_max: 40000
          max_max: 70000
          p95_max: 60000
          description: "Undergraduate: Lower frequency, technical content"
      reasoning_policy:
        cot:
          allowed: true
          max_tokens: 64
        agentic: "forbidden"

    B4:
      name: "Graduate"
      intent: "Explicit abstraction and algorithms"
      allowed_modalities: ["technical_text", "math", "code"]
      allowed_domains: ["science", "math", "code", "instruction"]
      constraints:
        tokenizer:
          avg_max: 70000
          max_max: 100000
          p95_max: 90000
          description: "Graduate: Low frequency, complex reasoning"
      reasoning_policy:
        cot:
          allowed: true
          max_tokens: 128
        agentic: "toy_only"

    B5:
      name: "PhD"
      intent: "Planning and system-level reasoning"
      allowed_modalities:
        ["hard_reasoning", "math", "advanced_code", "planning"]
      allowed_domains: ["instruction", "science", "math", "code"]
      constraints:
        tokenizer:
          avg_max: .inf
          max_max: .inf
          p95_max: .inf
          description: "PhD: Very low frequency, advanced/rare terms"
      reasoning_policy:
        cot:
          allowed: true
          max_tokens: 256
        agentic:
          allowed: true
          max_token_share: 0.02

# TODO: Add Triggers
