services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: p12-clickhouse
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8123"   # HTTP — localhost only (admin / healthcheck)
      - "0.0.0.0:8443:8443"     # HTTPS — public, requires auth
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: training_observability
    volumes:
      # EBS gp3 bind-mounts (external volume at /data/clickhouse)
      - /data/clickhouse/data:/var/lib/clickhouse
      - /data/clickhouse/logs:/var/log/clickhouse-server
      - ./initdb.d:/docker-entrypoint-initdb.d:ro
      - ./users.d:/etc/clickhouse-server/users.d:ro
      - ./config.d:/etc/clickhouse-server/config.d:ro
      - ./tls:/etc/clickhouse-server/tls:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 20
