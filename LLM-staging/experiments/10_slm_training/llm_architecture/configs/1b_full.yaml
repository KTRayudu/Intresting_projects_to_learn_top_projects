# =============================================================================
# LLM 1B FULL - All Advanced Features Enabled
# =============================================================================
# Same hybrid DeltaNet + GSA architecture as base, with extended context.
# Combines: DeltaNet + GSA + YaRN + mHC + MTP
# Parameters: ~1B active
# =============================================================================

model_name: "LLM-1B-Full"
model_version: "1.0.0"

# Core architecture
vocab_size: 131072
hidden_size: 4096
num_hidden_layers: 8
max_position_embeddings: 32768     # Extended context

# Normalization
rms_norm_eps: 1.0e-6
use_pre_norm: true

# Initialization & Dropout
initializer_range: 0.02
hidden_dropout: 0.0
dtype: "bfloat16"

# -----------------------------------------------------------------------------
# Attention Configuration - Hybrid DeltaNet + GSA
# -----------------------------------------------------------------------------
attention:
  attention_type: "grouped_query"

  # GQA: 16Q / 2KV x 256 head_dim
  num_attention_heads: 16
  num_key_value_heads: 2
  head_dim: 256
  attention_dropout: 0.0
  attention_bias: false

  # DeltaNet: 32V / 16QK x 128, gate=384
  delta_v_heads: 32
  delta_qk_heads: 16
  delta_head_dim: 128
  delta_gate_dim: 384

  # GSA: 16 x 256
  gsa_num_heads: 16
  gsa_head_dim: 256
  gsa_indexer_dim: 64
  gsa_num_indexer_heads: 4
  gsa_k_base: 512
  gsa_k_min: 32
  gsa_k_max: 1024

  # Mixer: 75% Delta / 25% GSA
  mixer_delta_ratio: 0.75
  mixer_gsa_ratio: 0.25

  # GSA tuning
  gsa_use_adaptive_k: true
  gsa_adaptive_k_method: "variance"
  gsa_use_value_gate: true
  gsa_use_output_gate: true
  gsa_gate_activation: "sigmoid"
  gsa_indexer_activation: "sigmoid"
  gsa_use_triton_kernels: true

  # DeepSeek parameters (available for switching)
  ds_compressed_dim: 512
  ds_rope_head_dim: 32
  ds_num_shared_experts: 1
  ds_q_lora_rank: 0

# -----------------------------------------------------------------------------
# Position Embedding Configuration - YARN (Extended Context)
# -----------------------------------------------------------------------------
position:
  position_type: "yarn"
  rope_theta: 10000.0
  rope_scaling_factor: 1.0
  yarn_scale: 8.0                  # 8x context extension
  yarn_original_max_position: 8192
  yarn_beta_fast: 32.0
  yarn_beta_slow: 1.0
  yarn_mscale: 1.0
  yarn_mscale_all_dim: 0.0

# -----------------------------------------------------------------------------
# Feed-Forward Network Configuration - Dense Shared Expert
# -----------------------------------------------------------------------------
ffn:
  ffn_type: "swiglu"
  intermediate_size: 2048
  ffn_dropout: 0.0
  ffn_bias: false
  moe_num_experts: 0
  moe_num_experts_per_tok: 0
  moe_aux_loss_coef: 0.01

# -----------------------------------------------------------------------------
# Connection Configuration - Manifold Hyper-Connections
# -----------------------------------------------------------------------------
connection:
  connection_type: "mhc"
  mhc_expansion_rate: 4
  mhc_alpha_init: 0.01
  mhc_sinkhorn_iters: 20

# -----------------------------------------------------------------------------
# Output Head Configuration - Multi-Token Prediction
# -----------------------------------------------------------------------------
head:
  use_multi_token_prediction: true
  num_predict_tokens: 2
  mtp_loss_weight: 0.3
  mtp_block_type: "full_transformer"
  tie_word_embeddings: true

# -----------------------------------------------------------------------------
# Training Configuration
# -----------------------------------------------------------------------------
training:
  max_steps: 20000
  max_epochs: null
  batch_size: 2
  gradient_accumulation_steps: 16
  seq_length: 2048

  # Optimizer
  learning_rate: 1.0e-4            # Conservative LR for full model
  min_learning_rate: 1.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8

  # LR Schedule
  warmup_steps: 1000               # Longer warmup for complex model
  lr_decay_style: "cosine"

  # Regularization
  gradient_clip: 1.0
  dropout: 0.0

  # Precision
  use_amp: true
  amp_dtype: "bfloat16"

  # Device
  device: "auto"

  # Checkpointing
  save_interval: 1000
  checkpoint_dir: "./checkpoints/1b_full"

  # Logging
  log_interval: 10
  eval_interval: 500

  # Experiment
  experiment_name: "1b_full_delta_gsa_mhc_mtp"
  seed: 42

# =============================================================================
# End of Configuration
# =============================================================================
