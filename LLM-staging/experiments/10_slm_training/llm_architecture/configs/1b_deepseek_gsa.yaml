# =============================================================================
# LLM 1B with DeepSeek-style Gated Sparse Attention (GSA)
# =============================================================================
# Corrected implementation of GSA with proper 1/sqrt(d) scaling
# Memory-optimized defaults for MPS/limited VRAM
# Parameters: ~1.1B
# =============================================================================

model_name: "LLM-1B-DeepSeek-GSA"
model_version: "1.0.0"

# Core architecture
vocab_size: 50304
hidden_size: 2048
num_hidden_layers: 16
max_position_embeddings: 4096

# Normalization
rms_norm_eps: 1.0e-6
use_pre_norm: true

# Initialization & Dropout
initializer_range: 0.02
hidden_dropout: 0.0
dtype: "bfloat16"

# -----------------------------------------------------------------------------
# Attention Configuration - DEEPSEEK GSA (Recommended)
# -----------------------------------------------------------------------------
attention:
  attention_type: "deepseek_gsa"     # DeepSeek-style GSA (corrected implementation)
  num_attention_heads: 16
  num_key_value_heads: 4
  head_dim: 128
  attention_dropout: 0.0
  attention_bias: false
  
  # GSA Indexer parameters
  gsa_indexer_dim: 64                # d_I: Low-dim indexer projection
  gsa_num_indexer_heads: 4           # H_I: Number of indexer heads
  gsa_indexer_activation: "sigmoid"  # Indexer activation function
  
  # Adaptive sparsity - Memory-optimized defaults for MPS
  # For CUDA with more VRAM, increase: k_base=512-1024, k_max=1024-2048
  gsa_k_base: 128                    # Base selection budget (small for MPS)
  gsa_k_min: 32                      # Minimum tokens to attend
  gsa_k_max: 256                     # Maximum tokens to attend (small for MPS)
  gsa_use_adaptive_k: true           # Enable adaptive k selection
  gsa_adaptive_k_method: "variance"  # Method: variance, entropy, learned
  gsa_adaptive_k_temperature: 1.0    # Temperature for adaptive scaling
  
  # Gating (G1 + G2 dual gating)
  gsa_use_value_gate: true           # G2: Applied after V projection
  gsa_use_output_gate: true          # G1: Applied after attention
  gsa_gate_activation: "sigmoid"     # Gate activation function
  gsa_gate_bias_init: 0.5            # Initial gate bias
  
  # DeepSeek MLA specific (unused)
  ds_compressed_dim: 512
  ds_rope_head_dim: 32
  ds_num_shared_experts: 1
  ds_q_lora_rank: 0

# -----------------------------------------------------------------------------
# Position Embedding Configuration
# -----------------------------------------------------------------------------
position:
  position_type: "yarn"              # YaRN for extended context capability
  rope_theta: 10000.0
  rope_scaling_factor: 1.0
  yarn_scale: 8.0                    # 8x context extension
  yarn_original_max_position: 4096
  yarn_beta_fast: 32.0
  yarn_beta_slow: 1.0
  yarn_mscale: 1.0
  yarn_mscale_all_dim: 0.0

# -----------------------------------------------------------------------------
# Feed-Forward Network Configuration
# -----------------------------------------------------------------------------
ffn:
  ffn_type: "swiglu"
  intermediate_size: 5504
  ffn_dropout: 0.0
  ffn_bias: false
  moe_num_experts: 8
  moe_num_experts_per_tok: 2
  moe_aux_loss_coef: 0.01

# -----------------------------------------------------------------------------
# Connection Configuration
# -----------------------------------------------------------------------------
connection:
  connection_type: "residual"
  mhc_expansion_rate: 4
  mhc_alpha_init: 0.01
  mhc_sinkhorn_iters: 20

# -----------------------------------------------------------------------------
# Output Head Configuration
# -----------------------------------------------------------------------------
head:
  use_multi_token_prediction: true
  num_predict_tokens: 1
  mtp_loss_weight: 0.3
  tie_word_embeddings: true

# -----------------------------------------------------------------------------
# Training Configuration
# -----------------------------------------------------------------------------
training:
  max_steps: 10000
  max_epochs: null
  batch_size: 2                      # Small batch for memory efficiency
  gradient_accumulation_steps: 16    # Effective batch = 32
  seq_length: 512                    # Moderate for MPS memory
  
  # Optimizer
  learning_rate: 3.0e-4
  min_learning_rate: 1.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  
  # LR Schedule
  warmup_steps: 500
  lr_decay_style: "cosine"
  
  # Regularization
  gradient_clip: 1.0
  dropout: 0.0
  
  # Precision
  use_amp: true
  amp_dtype: "bfloat16"
  
  # Device
  device: "auto"
  
  # Checkpointing
  save_interval: 1000
  checkpoint_dir: "./checkpoints/1b_deepseek_gsa"
  
  # Logging
  log_interval: 10
  eval_interval: 500
  
  # Experiment
  experiment_name: "1b_deepseek_gsa"
  seed: 42

  # torch.compile (requires PyTorch 2.0+)
  # Modes: "default" (safe), "max-autotune-no-cudagraphs" (recommended),
  #         "max-autotune" (+ CUDAGraphs, incompatible with MTP),
  #         "reduce-overhead" (CUDAGraphs only, incompatible with MTP)
  use_torch_compile: false
  torch_compile_mode: "max-autotune-no-cudagraphs"
  torch_compile_fullgraph: false        # true = strict, no graph breaks allowed
  torch_compile_dynamic: false          # true = support variable input shapes
  torch_compile_backend: "inductor"     # inductor (default), cudagraphs

# =============================================================================
# End of Configuration
# =============================================================================
