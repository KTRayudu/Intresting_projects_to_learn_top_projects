# =============================================================================
# LLM 1B with Multi-Token Prediction (MTP)
# =============================================================================
# DeepSeek-style auxiliary prediction heads
# Predicts multiple future tokens simultaneously
# Parameters: ~1.1B + auxiliary heads
# =============================================================================

model_name: "LLM-1B-MTP"
model_version: "1.0.0"

# Core architecture
vocab_size: 50304
hidden_size: 2048
num_hidden_layers: 24
max_position_embeddings: 4096

# Normalization
rms_norm_eps: 1.0e-6
use_pre_norm: true

# Initialization & Dropout
initializer_range: 0.02
hidden_dropout: 0.0
dtype: "bfloat16"

# -----------------------------------------------------------------------------
# Attention Configuration
# -----------------------------------------------------------------------------
attention:
  attention_type: "grouped_query"
  num_attention_heads: 16
  num_key_value_heads: 4
  head_dim: 128
  attention_dropout: 0.0
  attention_bias: false
  gsa_indexer_dim: 64
  gsa_num_indexer_heads: 4
  gsa_k_base: 2048
  gsa_k_min: 256
  gsa_k_max: 4096
  ds_compressed_dim: 512
  ds_rope_head_dim: 32
  ds_num_shared_experts: 1
  ds_q_lora_rank: 0

# -----------------------------------------------------------------------------
# Position Embedding Configuration
# -----------------------------------------------------------------------------
position:
  position_type: "rope"
  rope_theta: 10000.0
  rope_scaling_factor: 1.0
  yarn_scale: 1.0
  yarn_original_max_position: 4096
  yarn_beta_fast: 32.0
  yarn_beta_slow: 1.0
  yarn_mscale: 1.0
  yarn_mscale_all_dim: 0.0

# -----------------------------------------------------------------------------
# Feed-Forward Network Configuration
# -----------------------------------------------------------------------------
ffn:
  ffn_type: "swiglu"
  intermediate_size: 5504
  ffn_dropout: 0.0
  ffn_bias: false
  moe_num_experts: 8
  moe_num_experts_per_tok: 2
  moe_aux_loss_coef: 0.01

# -----------------------------------------------------------------------------
# Connection Configuration
# -----------------------------------------------------------------------------
connection:
  connection_type: "residual"
  mhc_expansion_rate: 4
  mhc_alpha_init: 0.01
  mhc_sinkhorn_iters: 20

# -----------------------------------------------------------------------------
# Output Head Configuration - MULTI-TOKEN PREDICTION
# -----------------------------------------------------------------------------
head:
  use_multi_token_prediction: true   # MTP enabled
  num_predict_tokens: 4              # Predict 4 tokens simultaneously
  mtp_loss_weight: 0.3               # Auxiliary loss weight (main=0.7, aux=0.3)
  tie_word_embeddings: true

# -----------------------------------------------------------------------------
# Training Configuration
# -----------------------------------------------------------------------------
training:
  max_steps: 10000
  max_epochs: null
  batch_size: 4
  gradient_accumulation_steps: 8
  seq_length: 1024
  
  # Optimizer
  learning_rate: 3.0e-4
  min_learning_rate: 1.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-8
  
  # LR Schedule
  warmup_steps: 500
  lr_decay_style: "cosine"
  
  # Regularization
  gradient_clip: 1.0
  dropout: 0.0
  
  # Precision
  use_amp: true
  amp_dtype: "bfloat16"
  
  # Device
  device: "auto"
  
  # Checkpointing
  save_interval: 1000
  checkpoint_dir: "./checkpoints/1b_mtp"
  
  # Logging
  log_interval: 10
  eval_interval: 500
  
  # Experiment
  experiment_name: "1b_mtp"
  seed: 42

# =============================================================================
# End of Configuration
# =============================================================================
