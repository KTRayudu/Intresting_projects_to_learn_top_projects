data:
  loader_type: bin_idx            # Options: hf, bin_idx, curriculum_v2
  shard_dir: ../data/d1_shards
  eval_shard_dir: null
  tokenizer_dir: ../tokenizer
  validate_tokenizer: true
  # Curriculum v2 settings (only used when loader_type: curriculum_v2)
  curriculum_config_path: null     # e.g. ../configs/curriculum_v2.yaml
  curriculum_stage: "1B"           # Stage from curriculum_v2.yaml: 1B, WU_3B, 3B, etc.
  curriculum_mode: combined        # opus_candidates, always_on, or combined
  manifest_dir: null               # e.g. ../manifests
  dataset_name: wikitext
  dataset_config: wikitext-103-raw-v1
  tokenize_num_proc: 8
  max_length: 4096
  num_workers: 16
  tokenized_dataset_path: null
  dataset_cache_dir: null
  local_nvme_cache_dir: null
  require_local_nvme: false
  pack_into_blocks: true
  block_sizes:
  - 4096
  block_size_counts: null
  domain_column: null
  concat_across_domains: false
  drop_remainder: true

training:
  num_epochs: 1
  max_train_steps: 1000
  max_train_seconds: null
  max_eval_steps: null
  log_interval: 1
  seed: 42
  lr_schedule_path: ../configs/lr_schedule.yaml
  lr_stage: "1B"
  init_model_path: ../results/init/model_init.pt
  require_gsa_triton: true
  require_fused_kernels: false
  use_fused_ce: true
  max_chunk_gb: 8
  metrics_jsonl_path: ../results/run/metrics.jsonl
  profile_steps: []
  enable_system_metrics: false

deepspeed:
  config_path: ../deepspeed/zero-3-1b.json
  local_rank: -1

model:
  embedding_type: kronecker

checkpoint:
  output_dir: ../results/run/checkpoints
  save_checkpoint: true
  checkpoint_interval: null           # Disabled — spot orchestrator handles periodic checkpoints
  keep_last_n_checkpoints: 3
  resume_from_checkpoint: null
  resume_step: null

spot_checkpoint:
  enabled: true
  checkpoint_interval_seconds: 3600   # 1 hour periodic checkpoint
  spot_poll_interval: 5.0             # Poll EC2 metadata every 5s
  keep_last_n_local: 3                # Keep 3 most recent local checkpoints
  log_max_bytes: 52428800             # 50MB per log file before rotation
  spot_metadata_url: null             # Override for testing (e.g. http://localhost:8111)

s3:
  enabled: false
  bucket: null
  prefix: training/checkpoints
  region: us-east-1
  cleanup_after_upload: false

generation:
  test_generation: false
  generation_prompt: The history of artificial intelligence begins with

observability:
  enabled: false
  log_dir: /tmp/training_logs
  metrics_port: 8000
  skip_vector_check: true
  system_metrics_interval: 5.0
