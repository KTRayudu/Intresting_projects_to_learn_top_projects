# ============================================================================
# LR Schedule — Progressive Model Growth (1B → 3B → 8B → 70B)
# ============================================================================
#
# Usage: Set training.lr_stage in your training config YAML to the stage name.
#        The scheduler auto-computes total_steps from token_budget and batch info.
#
# warmup_from: "auto" means use end_lr of the previous stage.
#              A number means start warmup from that LR.
#              0 means start from zero (first stage only).
#
# decay_ratio: peak_lr / end_lr. Set to 1 for flat LR (warmup-only stages).

stages:
  - name: "1B"
    token_budget: 30.2e9       # Chinchilla: 20x params (1.513B)
    peak_lr: 1.0e-3
    decay_ratio: 10            # end_lr = 1e-4
    warmup_steps: 1000
    warmup_from: 0             # first stage: start from zero
    weight_decay: 0.1          # non-reversible, can use wd

  - name: "WU_3B"
    token_budget: 0.6e9
    peak_lr: 5.0e-4
    decay_ratio: 1             # flat: no decay during warmup stage
    warmup_steps: 500
    warmup_from: auto          # = 1e-4 (end_lr of 1B)
    weight_decay: 0.0          # reversible from here on

  - name: "3B"
    token_budget: 5.7e9
    peak_lr: 5.0e-4
    decay_ratio: 10            # end_lr = 5e-5
    warmup_steps: 0
    warmup_from: auto          # = 5e-4 (end_lr of WU_3B = peak since ratio=1)
    weight_decay: 0.0

  - name: "WU_8B"
    token_budget: 0.3e9
    peak_lr: 3.0e-4
    decay_ratio: 1
    warmup_steps: 500
    warmup_from: auto          # = 5e-5 (end_lr of 3B)
    weight_decay: 0.0

  - name: "8B"
    token_budget: 8.7e9
    peak_lr: 3.0e-4
    decay_ratio: 10            # end_lr = 3e-5
    warmup_steps: 0
    warmup_from: auto          # = 3e-4 (end_lr of WU_8B = peak since ratio=1)
    weight_decay: 0.0

  - name: "WU_70B"
    token_budget: 0.2e9
    peak_lr: 1.0e-4
    decay_ratio: 1
    warmup_steps: 500
    warmup_from: auto          # = 3e-5 (end_lr of 8B)
    weight_decay: 0.0

  - name: "70B"
    token_budget: 1.5e9
    peak_lr: 1.0e-4
    decay_ratio: 100           # end_lr = 1e-6 (final model, aggressive decay)
    warmup_steps: 0
    warmup_from: auto          # = 1e-4 (end_lr of WU_70B = peak since ratio=1)
    weight_decay: 0.0
